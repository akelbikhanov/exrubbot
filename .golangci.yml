version: "2"

linters:
  enable:
    - govet           # встроенный анализатор Go, must-have
    - errcheck        # проверка необработанных ошибок
    - staticcheck     # мощный набор статичных анализаторов
    - unused          # обнаружение неиспользуемого кода
    - gocritic        # лучшие практики и предупреждения
    - revive          # современная альтернатива golint

formatters:
  enable:
    - gofmt           # автоформатирование (простое)
    - gci             # строгий порядок импортов

run:
  tests: true
  timeout: 5m

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

exclude-rules:
  - path: '_test\.go'
    linters:
      - errcheck
      - staticcheck

  - path: 'internal/.*_gen.go'
    linters:
      - all

  - path: 'migrations/.*\.go'
    linters:
      - revive
      - gocritic
